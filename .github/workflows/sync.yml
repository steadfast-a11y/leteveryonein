name: Sync to steadfast-a11y/leteveryonein

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to leteveryonein
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git remote add target https://x-access-token:${SYNC_TOKEN}@github.com/steadfast-a11y/leteveryonein.git
          git push target main --force
